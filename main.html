<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Animator Web Studio - v1.5 (Modular)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/RoundedBoxGeometry.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="canvas-container"></div>
    <div id="action-toast" class="action-toast">Action completed!</div>

    <div id="part-tooltip" class="fixed pointer-events-none hidden tooltip-bg text-xs px-3 py-2 rounded shadow-2xl z-50 border transition-opacity">
        <div class="font-bold text-accent mb-1 border-b pb-1" id="tooltip-part-name">Part Name</div>
        <div class="mt-1"><span class="text-yellow-400 font-bold">R</span> - Toggle Move/Rotate</div>
        <div><span class="text-yellow-400 font-bold">G</span> - World / Part Space</div>
    </div>

    <div class="absolute top-0 left-0 w-full h-14 panel flex items-center justify-between px-4 z-20" style="position: fixed;">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded flex items-center justify-center font-bold text-white shadow-lg logo-bg">M</div>
            <h1 class="font-semibold tracking-wide flex items-center gap-2">Moon Animator <span class="text-xs text-accent font-normal">v1.5</span></h1>
            <div class="w-px h-6 bg-border mx-2"></div>
            <input type="text" id="anim-name" value="My_Animation" class="input-field text-sm px-2 py-1 rounded outline-none w-48" placeholder="Animation Name">
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="app.pluginManager.openMenu()" class="btn-secondary px-3 py-1.5 rounded text-sm font-medium mr-4 flex items-center gap-2">
                Plugins
            </button>
            <button onclick="app.smoothSelectedKeyframes()" class="btn-secondary px-3 py-1.5 rounded text-sm font-medium mr-2">Smooth (M)</button>
            <input type="file" id="import-file" class="hidden" accept=".json" onchange="app.handleImport(event)">
            <button onclick="document.getElementById('import-file').click()" class="btn-secondary px-4 py-1.5 rounded text-sm font-medium flex items-center gap-2">Import</button>
            <button onclick="app.exportAnimation()" class="btn-primary px-4 py-1.5 rounded text-sm font-medium flex items-center gap-2">Export</button>
        </div>
    </div>

    <div id="panel-hierarchy" class="panel rounded-lg flex flex-col z-10" style="top: 4.5rem; left: 1rem; width: 256px; height: 350px;">
        <div class="resizer resizer-r" data-resize="hierarchy" data-dir="r"></div>
        <div class="resizer resizer-b" data-resize="hierarchy" data-dir="b"></div>
        <div class="resizer resizer-br" data-resize="hierarchy" data-dir="br"></div>
        
        <div class="p-3 border-b font-semibold text-sm cursor-move drag-handle" data-target="panel-hierarchy">R6 Rig Hierarchy</div>
        <div id="hierarchy-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        <div class="p-3 border-t bg-black/20 rounded-b-lg">
            <div class="text-xs opacity-70 mb-1">Selected Part</div>
            <div id="selected-part-name" class="text-accent font-mono text-sm">None</div>
        </div>
    </div>

    <div id="plugin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm hidden">
        <div class="panel w-[30rem] rounded-xl p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-3 border-b pb-3">Plugin Manager</h2>
            <div id="installed-plugins-list" class="space-y-2 mb-4 max-h-48 overflow-y-auto">
                <p class="text-sm opacity-60">No plugins installed.</p>
            </div>
            <div class="border-t pt-4">
                <p class="text-xs opacity-70 mb-2">Install a plugin by selecting its .js file.</p>
                <input type="file" id="plugin-file-input" class="hidden" accept=".js" onchange="app.pluginManager.loadPluginFile(event)">
                <button onclick="document.getElementById('plugin-file-input').click()" class="w-full btn-primary py-2.5 rounded font-bold uppercase tracking-wide">Install Plugin (.js)</button>
                <button onclick="app.pluginManager.closeMenu()" class="mt-2 w-full btn-secondary py-2 rounded text-sm">Close</button>
            </div>
        </div>
    </div>

    <script src="functions.js"></script>
</body>
</html>
